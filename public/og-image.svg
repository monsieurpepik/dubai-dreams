<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#f0d078"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1200" y2="530" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="1200" y2="260" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Gold accent line -->
  <rect x="80" y="200" width="60" height="2" fill="url(#gold)"/>

  <!-- Brand name -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="200" fill="white" letter-spacing="2">
    Owning<tspan font-weight="400">Dubai</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" letter-spacing="6" text-transform="uppercase">
    THE SMARTEST ENTRY TO DUBAI REAL ESTATE
  </text>

  <!-- Stats row -->
  <g transform="translate(80, 420)">
    <text font-family="system-ui, sans-serif" font-size="36" font-weight="300" fill="white">38+</text>
    <text y="28" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="3">PROJECTS</text>
  </g>
  <g transform="translate(250, 420)">
    <text font-family="system-ui, sans-serif" font-size="36" font-weight="300" fill="white">9</text>
    <text y="28" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="3">DEVELOPERS</text>
  </g>
  <g transform="translate(420, 420)">
    <text font-family="system-ui, sans-serif" font-size="36" font-weight="300" fill="white">7%+</text>
    <text y="28" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="3">AVG ROI</text>
  </g>

  <!-- Domain -->
  <text x="80" y="560" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" letter-spacing="4">
    OWNINGDUBAI.COM
  </text>

  <!-- Decorative gold corner -->
  <rect x="1100" y="0" width="100" height="4" fill="url(#gold)"/>
  <rect x="1196" y="0" width="4" height="100" fill="url(#gold)"/>
</svg>
